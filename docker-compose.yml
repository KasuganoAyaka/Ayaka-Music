services:
  mysql:
    image: mysql:8.4
    container_name: ayaka-music-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ayaka_music
      MYSQL_USER: ayaka
      MYSQL_PASSWORD: ayaka_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

volumes:
  mysql_data:
